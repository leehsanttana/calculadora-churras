<svg width="1200" height="340" viewBox="0 0 1200 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sonochurras — Calculadora de churrasco">
  <defs>
    <pattern id="confete" width="44" height="44" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="3" fill="#009c3b" opacity="0.10"/>
      <circle cx="28" cy="28" r="3" fill="#ffc800" opacity="0.18"/>
    </pattern>
  </defs>

  <!-- Fundo creme + confete (igual à tela inicial) -->
  <rect width="1200" height="340" fill="#fff9e6"/>
  <rect width="1200" height="340" fill="url(#confete)"/>

  <!-- Faixa tricolor verde / amarelo / azul -->
  <rect x="0" y="0" width="400" height="12" fill="#009c3b"/>
  <rect x="400" y="0" width="400" height="12" fill="#ffdf00"/>
  <rect x="800" y="0" width="400" height="12" fill="#1351b4"/>

  <!-- Conteúdo central -->
  <text x="600" y="120" text-anchor="middle" font-size="64">🔥</text>

  <!-- Badge "Edição Copa do Mundo" (sticker amarelo) -->
  <g transform="translate(600 150)">
    <rect x="-180" y="-22" width="360" height="40" rx="20" fill="#ffdf00" stroke="#08260f" stroke-width="2.5"/>
    <text x="3" y="5" text-anchor="middle" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="18" font-weight="700" letter-spacing="1.5" fill="#08260f">🏆 EDIÇÃO COPA DO MUNDO</text>
  </g>

  <!-- Título com sombra "sticker" -->
  <text x="604" y="252" text-anchor="middle" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="78" font-weight="800" letter-spacing="2" fill="#08260f" opacity="0.18">SONOCHURRAS</text>
  <text x="600" y="248" text-anchor="middle" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="78" font-weight="800" letter-spacing="2" fill="#009c3b">SONOCHURRAS</text>

  <!-- Subtítulo -->
  <text x="600" y="292" text-anchor="middle" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="24" font-weight="700" letter-spacing="3" fill="#047a30">CALCULADORA DE CHURRASCO</text>
</svg>
